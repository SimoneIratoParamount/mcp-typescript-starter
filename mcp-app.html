<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    /* Horizontal card layout */
    .card {
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 28px 32px;
      width: 100%;
      max-width: 520px;
      color: #fff;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      gap: 28px;
    }
    /* Left column: emoji + temp */
    .card-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }
    .emoji { font-size: 56px; line-height: 1; display: block; }
    .temp { font-size: 52px; font-weight: 700; line-height: 1.1; letter-spacing: -2px; margin-top: 6px; }
    .unit { font-size: 22px; font-weight: 300; vertical-align: super; letter-spacing: 0; }
    /* Divider between columns */
    .vdivider {
      width: 1px;
      align-self: stretch;
      background: rgba(255,255,255,0.3);
      flex-shrink: 0;
    }
    /* Right column: location, conditions, stats, button */
    .card-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .city {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.8;
    }
    .conditions { font-size: 18px; font-weight: 500; text-transform: capitalize; }
    .stats { display: flex; gap: 20px; }
    .stat-value { font-size: 16px; font-weight: 600; }
    .stat-label { font-size: 10px; opacity: 0.72; text-transform: uppercase; letter-spacing: 0.6px; margin-top: 2px; }
    .btn {
      align-self: flex-start;
      margin-top: 4px;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: #fff;
      padding: 7px 20px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.35); }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: rgba(255,255,255,0.7);
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/mcp-app.tsx"></script>
</body>
</html>
